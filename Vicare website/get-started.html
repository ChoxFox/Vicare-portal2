<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Vicare</title>
  <!-- Direct link path configuration routing into your assets styles folder -->
  <link rel="stylesheet" href="assets/css/get-started.css">
  <!-- Stable icons framework vector library -->
  <link rel="stylesheet" href="https://cloudflare.com" />
</head>

<body>
  <section class="bg-img">
    <div class="overlay">

      <div class="container">
        <h1>Join <span>Vicare</span></h1>
        <p class="pala">How will you use Vicare?</p>

        <!-- TWO-COLUMN CONTAINER GRID FOR THE CARDS -->
        <div class="card-wrapper">

          <!-- DOCTOR DISPATCH SELECTION CARD -->
          <div class="card">
            <h2>Doctor</h2>
            <p>Manage patients, appointments, and provide healthcare services.</p>
            <a href="doctor-signup-forms.html" class="btn doctor">Doctors start here</a>
          </div>

          <!-- PATIENT DISPATCH SELECTION CARD -->
          <div class="card delay">
            <h2>Patient</h2>
            <p>Book appointments, access medical records, and connect with doctors.</p>
            <a href="patient-signup-forms.html" class="btn patient">Patients start here</a>
          </div>

        </div> <!-- Closes card-wrapper section grid -->
      </div> <!-- Closes content container block framework -->

    </div> <!-- Closes background overlay sheet mask cleanly -->
  </section>

  
</body>

</html>
