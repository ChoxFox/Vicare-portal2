<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Sign up - Vicare</title>
    <!-- Linked natively to your responsive assets stylesheet folder -->
    <link rel="stylesheet" href="assets/css/patient-signup-form.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>

<body>

    <!-- LEFT SIDEBAR STACK COLUMN: BRANDING HERO CAPTIONS -->
    <div class="form-bg-img" id="heroBg">
        <div class="overlay">
            <h1>Sign up to book appointments, access medical records, and connect with doctors.</h1>
        </div>
    </div>

    <!-- RIGHT STACK COLUMN: WIZARD FIELD PROCESSING SECTIONS -->
    <div class="right" id="rightSection">
        <div class="form-container">

            <!-- MAIN DATA EXTRACTION WRAPPER FRAME (Routes relative to current root directory folder) -->
            <form id="patientSignupForm" action="patient-signup.php" method="POST" enctype="multipart/form-data">
  


                                <!-- STEP 1 VIEWPORT PANEL (Active Baseline Form Page View) -->
                <div class="step-section active" id="step1">
                    <h2>Sign up</h2>

                    <!-- 1. Patient First Name Input Card -->
                    <div class="input-container">
                        <label for="firstName">First Name</label>
                        <input type="text" placeholder="Enter your first name" id="firstName" name="first_name" required>
                    </div>

                    <!-- 2. Patient Last Name Input Card -->
                    <div class="input-container">
                        <label for="lastName">Last Name</label>
                        <input type="text" placeholder="Enter your last name" id="lastName" name="last_name" required>
                    </div>

                    <!-- 3. Dynamic Patient Contact Cell (Email or Phone Address Token String) -->
                    <div class="input-container">
                        <label for="contact">Mobile Number or Email</label>
                        <input type="text" placeholder="Enter mobile number or email" id="contact" name="contact" required>
                    </div>

                    <button type="button" class="btn next" onclick="goToStep2()">Next</button>
                </div>



                                <!-- STEP 2 VIEWPORT PANEL (Hidden by default layout settings, toggled via script handlers) -->
                <div class="step-section" id="step2">
                    <h2>Sign up</h2>

                    <!-- 4. Patient Password Block with Eye Visibility Toggles -->
                    <div class="input-container">
                        <label for="password">Password</label>
                        <div class="password-wrapper" style="position: relative; display: flex; align-items: center; width: 100%;">
                            <input type="password" placeholder="Create a password" id="password" name="password" required style="width: 100%; padding-right: 45px !important;">
                            <i class="fa-solid fa-eye" id="togglePasswordIcon" onclick="togglePasswordVisibility()" style="position: absolute; right: 15px; cursor: pointer; color: #64748b; z-index: 10;"></i>
                        </div>
                        <small style="color: #cbd5e1; font-size: 11px; display: block; margin-top: 4px;">Must be at least 8 characters.</small>
                    </div>

                    <!-- 5. Optional User Profile Photo Media Asset Upload Ingestion Slot -->
                    <div class="input-container" style="margin-top: 5px;">
                        <label for="imageInput" class="upload-title">Upload Profile Picture (optional)</label>
                        <input type="file" id="imageInput" accept="image/*" class="image" name="profile_pic">
                    </div>

                    <!-- Navigation Action Controller Grid Row Wrapper -->
                    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px; width: 100%;">
                        <button type="submit" class="btn next" style="margin: 0; width: 100%;">Create account</button>
                        <button type="button" class="btn back" onclick="goToStep1()" style="margin: 0; width: 100%;">Back</button>
                    </div>
                </div>

            </form>



                        <!-- ACCOUNT REGISTRATION SUCCESS DIALOGUE PANEL OVERLAY MODAL -->
            <div class="step-section" id="profileStep">
                <div class="profile-wrapper">
                    <div class="profile-card" style="background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); padding: 40px 30px; text-align: center; width: 100%; max-width: 400px;">
                        <div class="success-text" style="color: #00008b; font-weight: bold; margin-bottom: 20px; font-size: 20px;"><i class="fa-solid fa-circle-check" style="margin-right: 6px; color: #00a63e;"></i>Account created</div>
                        <div class="profile-image" style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 15px; border: 4px solid #00008b; background: #f1f5f9;">
                            <!-- Safe fallback image parameter stops background server cross-origin 404 handshakes -->
                            <img id="previewImage" src="assets/images/149071.png" alt="Profile Preview" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="doctor-name" id="patientName" style="font-size: 24px; font-weight: bold; color: #1e293b; margin-top: 20px;">Patient Name</div>
                        <button class="btn next" style="margin-top: 25px; width: 100%;" onclick="goToDashboard()">Continue to Dashboard</button>
                    </div>
                </div>
            </div>

            <!-- Redirection back link anchor tracking for onboarding channels layout options -->
            <div class="signup-link" style="margin-top: 25px; text-align: center; font-size: 14px; color: #cbd5e1;">
                <span>Already have a patient account?</span>
                <a href="patients-login-form.html" style="color: #3dfed8; text-decoration: none; font-weight: bold; margin-left: 5px; transition: color 0.2s ease;">Login here</a>
            </div>

        </div> <!-- Closes inner form-container layout blocks -->
    </div> <!-- Closes outer right column viewport wrapper section layout panels -->

    <!-- External wizard interaction scripts connected inside your assets js subfolder directory -->
    <script src="assets/js/patient-signup-form.js"></script>
</body>

</html>
